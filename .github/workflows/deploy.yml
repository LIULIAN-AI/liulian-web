name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:        # allows manual trigger from GitHub UI

env:
  DEPLOY_HOST: 158.132.12.57
  DEPLOY_PORT: 10022
  DEPLOY_USER: wenjixu
  FRONTEND_DIR: ~/liulian/frontend
  PM2_APP_NAME: liulian-web-app

jobs:
  # ─────────────────────────────────────────
  # Job 1: Type-check & lint on GitHub runner
  # ─────────────────────────────────────────
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Create CI .env.local
        # Clerk publishable key must be `pk_test_` + valid standard base64.
        # `pk_test_Y2ktYnVpbGQuY2xlcmsuYWNjb3VudHMuZGV2JA==` decodes to
        # `ci-build.clerk.accounts.dev$` — a safe fake that passes atob().
        # CLERK_SECRET_KEY just needs the sk_test_ prefix + valid non-empty value.
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_BACKEND_API_URL=http://localhost:8080/api
          NEXT_PUBLIC_CHAT_TRANSPORT=agent
          NEXT_PUBLIC_AGENT_BASE_URL=http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2ktYnVpbGQuY2xlcmsuYWNjb3VudHMuZGV2JA==
          CLERK_SECRET_KEY=sk_test_Y2ktYnVpbGRjbGVya3NlY3JldA==
          NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/
          EOF

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit || true    # warn only, don't fail CI

      - name: Build check
        # ESLint 9.x removed options Next.js 14 still passes internally —
        # ESLint is disabled in next.config.js (ignoreDuringBuilds: true)
        # so this only checks that the app compiles successfully.
        run: npm run build

  # ─────────────────────────────────────────
  # Job 2: Deploy to PolyU SSH server
  # Only runs on push to main (not on PRs)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            echo "=== [1/5] Pulling latest code ==="
            cd ${{ env.FRONTEND_DIR }}
            git fetch origin
            git reset --hard origin/main

            echo "=== [2/5] Verifying production .env.local ==="
            # Production .env.local is gitignored and stays on the server
            if [ ! -f .env.local ]; then
              echo "ERROR: .env.local missing on server! Aborting."
              exit 1
            fi
            grep -q "158.132.12.57:5000" .env.local || {
              echo "WARNING: .env.local may not point to production server"
            }
            grep -q '^NEXT_PUBLIC_CHAT_TRANSPORT=' .env.local || {
              echo "ERROR: NEXT_PUBLIC_CHAT_TRANSPORT missing in .env.local"
              exit 1
            }

            echo "=== [3/5] Installing dependencies ==="
            npm ci --prefer-offline

            echo "=== [4/5] Building Next.js ==="
            npm run build

            echo "=== [5/5] Restarting PM2 ==="
            pm2 restart ${{ env.PM2_APP_NAME }}
            pm2 save

            echo "--- Health check ---"
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/homepage || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ]; then
              echo "Frontend healthy (HTTP $STATUS)"
            else
              echo "WARNING: Frontend returned HTTP $STATUS"
              pm2 logs ${{ env.PM2_APP_NAME }} --lines 20 --nostream
            fi
            echo "=== Deployment complete! ==="
