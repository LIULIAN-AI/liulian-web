name: Code Scanning

# CodeQL static-analysis pipeline. Free on public repos; on private
# repos this requires GitHub Advanced Security (GHAS) — see
# `docs/ai-code-review.md` for the manual enablement step. Output is
# published to the Security → Code scanning tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 03:30 UTC sweep so dormant branches still get
    # re-evaluated against newly published query packs.
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` includes the `security-extended` set
          # plus maintainability/code-quality queries.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
